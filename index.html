<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoRabbit 小红书卡片生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="logo">
                <img src="assets/logo.svg" alt="EchoRabbit" onerror="this.style.display='none'">
                <span class="logo-text">EchoRabbit 卡片生成器</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-icon" id="themeToggle" title="切换主题">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
                <button class="btn btn-secondary" id="saveTemplate">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    保存模板
                </button>
                <button class="btn btn-primary" id="exportImage">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    导出图片
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 左侧模板面板 -->
            <aside class="sidebar sidebar-left">
                <div class="panel">
                    <h3 class="panel-title">📁 模板选择</h3>
                    
                    <div class="template-section">
                        <h4 class="section-title">预设模板</h4>
                        <div class="template-tabs">
                            <button class="tab-btn active" data-tab="note">笔记类</button>
                            <button class="tab-btn" data-tab="list">清单类</button>
                            <button class="tab-btn" data-tab="quote">语录类</button>
                        </div>
                        <div class="template-grid" id="presetTemplates">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <div class="template-section">
                        <h4 class="section-title">我的模板</h4>
                        <div class="template-list" id="customTemplates">
                            <div class="empty-state">暂无自定义模板</div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 中间画布区域 -->
            <section class="canvas-area">
                <div class="canvas-wrapper">
                    <div class="canvas-toolbar">
                        <button class="btn btn-icon btn-sm" id="zoomOut" title="缩小">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                <line x1="8" y1="11" x2="14" y2="11"/>
                            </svg>
                        </button>
                        <span id="zoomLevel">50%</span>
                        <button class="btn btn-icon btn-sm" id="zoomIn" title="放大">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                <line x1="11" y1="8" x2="11" y2="14"/>
                                <line x1="8" y1="11" x2="14" y2="11"/>
                            </svg>
                        </button>
                        <button class="btn btn-icon btn-sm" id="zoomFit" title="自适应">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                            </svg>
                        </button>
                    </div>
                    <div class="canvas-container" id="canvasContainer">
                        <div class="card-canvas" id="cardCanvas" style="width: 1080px; height: 1440px; transform: scale(0.5); transform-origin: top left;">
                            <!-- 动态内容 -->
                        </div>
                    </div>
                    <div class="canvas-info">
                        <span>1080 x 1440 px</span>
                        <span id="canvasSize">540 x 720</span>
                    </div>
                </div>

                <!-- 底部批量生成区 -->
                <div class="batch-section" id="batchSection">
                    <div class="batch-header">
                        <h4>📊 批量生成</h4>
                        <button class="btn btn-icon btn-sm" id="toggleBatch">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                    </div>
                    <div class="batch-content" id="batchContent">
                        <div class="batch-toolbar">
                            <button class="btn btn-sm" id="addBatchRow">+ 添加行</button>
                            <button class="btn btn-sm" id="importCSV">导入 CSV</button>
                            <button class="btn btn-sm btn-danger" id="clearBatch">清空</button>
                            <input type="file" id="csvInput" accept=".csv" hidden>
                        </div>
                        <div class="batch-table-wrapper">
                            <table class="batch-table" id="batchTable">
                                <thead>
                                    <tr id="batchHeader">
                                        <!-- 动态表头 -->
                                    </tr>
                                </thead>
                                <tbody id="batchBody">
                                    <!-- 动态行 -->
                                </tbody>
                            </table>
                        </div>
                        <div class="batch-actions">
                            <button class="btn btn-primary" id="batchGenerate">批量生成</button>
                            <button class="btn btn-secondary" id="batchExport">批量导出</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 右侧属性面板 -->
            <aside class="sidebar sidebar-right">
                <div class="panel">
                    <h3 class="panel-title">🎨 属性编辑</h3>
                    
                    <!-- 背景设置 -->
                    <div class="prop-section">
                        <h4 class="section-title">背景设置</h4>
                        <div class="prop-group">
                            <label class="prop-label">背景类型</label>
                            <div class="btn-group">
                                <button class="btn btn-sm active" data-bg-type="color">纯色</button>
                                <button class="btn btn-sm" data-bg-type="gradient">渐变</button>
                                <button class="btn btn-sm" data-bg-type="image">图片</button>
                            </div>
                        </div>
                        <div class="prop-group" id="bgColorGroup">
                            <label class="prop-label">背景颜色</label>
                            <input type="color" class="color-picker" id="bgColor" value="#fcfcfc">
                        </div>
                        <div class="prop-group" id="bgGradientGroup" style="display: none;">
                            <label class="prop-label">渐变设置</label>
                            <div class="gradient-presets">
                                <button class="gradient-preset" data-gradient="linear-gradient(135deg, #72e3ad 0%, #3b82f6 100%)" style="background: linear-gradient(135deg, #72e3ad 0%, #3b82f6 100%);"></button>
                                <button class="gradient-preset" data-gradient="linear-gradient(135deg, #f59e0b 0%, #ef4444 100%)" style="background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);"></button>
                                <button class="gradient-preset" data-gradient="linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%)" style="background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);"></button>
                                <button class="gradient-preset" data-gradient="linear-gradient(135deg, #10b981 0%, #06b6d4 100%)" style="background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);"></button>
                            </div>
                            <input type="text" class="text-input" id="bgGradientValue" placeholder="linear-gradient(...)">
                        </div>
                        <div class="prop-group" id="bgImageGroup" style="display: none;">
                            <label class="prop-label">背景图片</label>
                            <div class="image-upload" id="bgImageUpload">
                                <input type="file" accept="image/*" id="bgImageInput" hidden>
                                <div class="upload-placeholder">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                        <circle cx="8.5" cy="8.5" r="1.5"/>
                                        <polyline points="21 15 16 10 5 21"/>
                                    </svg>
                                    <span>点击上传图片</span>
                                </div>
                            </div>
                            <div class="prop-group">
                                <label class="prop-label">模糊度</label>
                                <input type="range" class="range-input" id="bgBlur" min="0" max="20" value="0">
                            </div>
                            <div class="prop-group">
                                <label class="prop-label">暗化程度</label>
                                <input type="range" class="range-input" id="bgDarken" min="0" max="100" value="0">
                            </div>
                        </div>
                    </div>

                    <!-- 元素属性 -->
                    <div class="prop-section" id="elementProps" style="display: none;">
                        <h4 class="section-title">元素属性</h4>
                        
                        <!-- 文字样式 -->
                        <div class="prop-group" id="textStyleGroup">
                            <label class="prop-label">文字内容</label>
                            <textarea class="textarea-input" id="textContent" rows="3"></textarea>
                        </div>

                        <div class="prop-group" id="fontFamilyGroup">
                            <label class="prop-label">字体</label>
                            <select class="select-input" id="fontFamily">
                                <option value="'Noto Sans SC', sans-serif">思源黑体</option>
                                <option value="'Noto Serif SC', serif">思源宋体</option>
                                <option value="Outfit, sans-serif">Outfit</option>
                                <option value="system-ui, sans-serif">系统默认</option>
                            </select>
                        </div>

                        <div class="prop-row">
                            <div class="prop-group">
                                <label class="prop-label">字号</label>
                                <input type="number" class="number-input" id="fontSize" min="12" max="120" value="16">
                            </div>
                            <div class="prop-group">
                                <label class="prop-label">字重</label>
                                <select class="select-input" id="fontWeight">
                                    <option value="300">细体</option>
                                    <option value="400" selected>常规</option>
                                    <option value="500">中等</option>
                                    <option value="700">粗体</option>
                                </select>
                            </div>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">文字颜色</label>
                            <input type="color" class="color-picker" id="textColor" value="#171717">
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">对齐方式</label>
                            <div class="btn-group">
                                <button class="btn btn-icon btn-sm" data-align="left">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="17" y1="10" x2="3" y2="10"/>
                                        <line x1="21" y1="6" x2="3" y2="6"/>
                                        <line x1="21" y1="14" x2="3" y2="14"/>
                                        <line x1="17" y1="18" x2="3" y2="18"/>
                                    </svg>
                                </button>
                                <button class="btn btn-icon btn-sm active" data-align="center">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="21" y1="10" x2="3" y2="10"/>
                                        <line x1="21" y1="6" x2="3" y2="6"/>
                                        <line x1="21" y1="14" x2="3" y2="14"/>
                                        <line x1="21" y1="18" x2="3" y2="18"/>
                                    </svg>
                                </button>
                                <button class="btn btn-icon btn-sm" data-align="right">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="21" y1="10" x2="7" y2="10"/>
                                        <line x1="21" y1="6" x2="3" y2="6"/>
                                        <line x1="21" y1="14" x2="3" y2="14"/>
                                        <line x1="21" y1="18" x2="7" y2="18"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">文字装饰</label>
                            <div class="btn-group">
                                <button class="btn btn-sm" data-decoration="none">无</button>
                                <button class="btn btn-sm" data-decoration="underline">下划线</button>
                                <button class="btn btn-sm" data-decoration="line-through">删除线</button>
                            </div>
                        </div>

                        <div class="prop-row">
                            <div class="prop-group">
                                <label class="prop-label">行高</label>
                                <input type="number" class="number-input" id="lineHeight" min="1" max="3" step="0.1" value="1.5">
                            </div>
                            <div class="prop-group">
                                <label class="prop-label">字间距</label>
                                <input type="number" class="number-input" id="letterSpacing" min="-2" max="10" value="0">
                            </div>
                        </div>

                        <!-- 图片/贴纸属性 -->
                        <div class="prop-group" id="imageProps" style="display: none;">
                            <label class="prop-label">替换图片</label>
                            <input type="file" accept="image/*" id="replaceImageInput" hidden>
                            <button class="btn btn-secondary btn-sm" id="replaceImage">选择新图片</button>
                        </div>

                        <!-- 通用属性 -->
                        <div class="prop-row">
                            <div class="prop-group">
                                <label class="prop-label">X 位置</label>
                                <input type="number" class="number-input" id="posX" min="0" max="1080">
                            </div>
                            <div class="prop-group">
                                <label class="prop-label">Y 位置</label>
                                <input type="number" class="number-input" id="posY" min="0" max="1440">
                            </div>
                        </div>

                        <div class="prop-row">
                            <div class="prop-group">
                                <label class="prop-label">宽度</label>
                                <input type="number" class="number-input" id="elemWidth" min="10" max="1080">
                            </div>
                            <div class="prop-group">
                                <label class="prop-label">高度</label>
                                <input type="number" class="number-input" id="elemHeight" min="10" max="1440">
                            </div>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">旋转角度</label>
                            <input type="range" class="range-input" id="rotation" min="-180" max="180" value="0">
                            <span class="range-value" id="rotationValue">0°</span>
                        </div>

                        <div class="prop-group">
                            <label class="prop-label">层级</label>
                            <div class="btn-group">
                                <button class="btn btn-sm" id="layerBottom">置底</button>
                                <button class="btn btn-sm" id="layerDown">下移</button>
                                <button class="btn btn-sm" id="layerUp">上移</button>
                                <button class="btn btn-sm" id="layerTop">置顶</button>
                            </div>
                        </div>

                        <div class="prop-actions">
                            <button class="btn btn-secondary btn-sm" id="duplicateElement">复制</button>
                            <button class="btn btn-danger btn-sm" id="deleteElement">删除</button>
                        </div>
                    </div>

                    <!-- 添加元素 -->
                    <div class="prop-section">
                        <h4 class="section-title">添加元素</h4>
                        <div class="add-elements">
                            <button class="add-btn" id="addText">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
                                </svg>
                                <span>文字</span>
                            </button>
                            <button class="add-btn" id="addImage">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                                <span>图片</span>
                            </button>
                            <button class="add-btn" id="addSticker">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                                <span>贴纸</span>
                            </button>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 导出设置弹窗 -->
    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>导出设置</h3>
                <button class="btn btn-icon" id="closeExportModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="prop-group">
                    <label class="prop-label">导出格式</label>
                    <div class="btn-group">
                        <button class="btn btn-sm active" data-format="png">PNG</button>
                        <button class="btn btn-sm" data-format="jpeg">JPEG</button>
                    </div>
                </div>
                <div class="prop-group">
                    <label class="prop-label">导出质量</label>
                    <input type="range" class="range-input" id="exportQuality" min="0.5" max="1" step="0.1" value="1">
                    <span class="range-value" id="qualityValue">100%</span>
                </div>
                <div class="prop-group">
                    <label class="prop-label">缩放比例</label>
                    <input type="range" class="range-input" id="exportScale" min="1" max="3" step="0.5" value="2">
                    <span class="range-value" id="scaleValue">2x (2160x2880)</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelExport">取消</button>
                <button class="btn btn-primary" id="confirmExport">导出</button>
            </div>
        </div>
    </div>

    <!-- 保存模板弹窗 -->
    <div class="modal" id="saveModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>保存模板</h3>
                <button class="btn btn-icon" id="closeSaveModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="prop-group">
                    <label class="prop-label">模板名称</label>
                    <input type="text" class="text-input" id="templateName" placeholder="输入模板名称">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelSave">取消</button>
                <button class="btn btn-primary" id="confirmSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="imageInput" accept="image/*" hidden>
    <input type="file" id="stickerInput" accept="image/*" hidden>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
